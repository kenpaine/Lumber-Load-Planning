<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<!-- viewport-fit=cover lets us paint under the notch / home indicator and use env(safe-area-*) -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Lumber Load</title>
<style>
  :root{
    --bg:#1a1f16;--bg2:#222820;--bg3:#2b3126;--border:#3d4a38;
    --text:#d8e4d2;--text2:#9aaa92;--text3:#6a7864;--green2:#7bbf60;
    --tabbar-h:54px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden;background:var(--bg)}
  body{
    font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
    color:var(--text);
    display:flex;flex-direction:column;
    /* fill the whole device; safe areas handled per-region below */
    height:100vh;height:100dvh;
    -webkit-text-size-adjust:100%;
    -webkit-user-select:none;user-select:none;
  }
  /* fills the notch/status-bar strip so app content doesn't slide under it awkwardly */
  .statusbar-pad{height:env(safe-area-inset-top);background:var(--bg);flex:0 0 auto}

  /* content area holds both apps; we keep both mounted and just toggle visibility
     so each app keeps its state when you switch tabs */
  .stage{position:relative;flex:1 1 auto;min-height:0;background:var(--bg)}
  .frame{
    position:absolute;inset:0;width:100%;height:100%;
    border:0;background:var(--bg);
    /* allow text selection inside the apps even though the shell disables it */
    -webkit-user-select:auto;user-select:auto;
  }
  .frame[hidden]{display:none}

  /* bottom tab bar */
  .tabbar{
    flex:0 0 auto;
    display:flex;
    background:var(--bg2);
    border-top:1px solid var(--border);
    padding-bottom:env(safe-area-inset-bottom);
  }
  .tab{
    flex:1 1 0;
    height:var(--tabbar-h);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:3px;
    background:none;border:0;cursor:pointer;
    color:var(--text3);
    font-family:inherit;font-size:11px;font-weight:600;letter-spacing:.2px;
    transition:color .12s;
  }
  .tab .ico{font-size:21px;line-height:1}
  .tab:active{background:var(--bg3)}
  .tab.active{color:var(--green2)}
</style>
</head>
<body>
  <div class="statusbar-pad"></div>

  <div class="stage">
    <iframe id="frame-tally"   class="frame" src="tally.html"   title="Tally Recommender"></iframe>
    <iframe id="frame-planner" class="frame" src="planner.html" title="Layout Planner" hidden></iframe>
  </div>

  <nav class="tabbar" role="tablist">
    <button class="tab active" data-tab="tally"   role="tab" aria-selected="true">
      <span class="ico">📋</span><span>Tally</span>
    </button>
    <button class="tab" data-tab="planner" role="tab" aria-selected="false">
      <span class="ico">🧮</span><span>Planner</span>
    </button>
  </nav>

<script>
  (function(){
    var KEY = "lumber.activeTab";
    var tabs   = Array.prototype.slice.call(document.querySelectorAll(".tab"));
    var frames = {
      tally:   document.getElementById("frame-tally"),
      planner: document.getElementById("frame-planner")
    };

    function show(name){
      if(!frames[name]) name = "tally";
      Object.keys(frames).forEach(function(k){ frames[k].hidden = (k !== name); });
      tabs.forEach(function(t){
        var on = (t.dataset.tab === name);
        t.classList.toggle("active", on);
        t.setAttribute("aria-selected", on ? "true" : "false");
      });
      try { localStorage.setItem(KEY, name); } catch(e){}
    }

    tabs.forEach(function(t){
      t.addEventListener("click", function(){ show(t.dataset.tab); });
    });

    var saved;
    try { saved = localStorage.getItem(KEY); } catch(e){}
    show(saved || "tally");
  })();
</script>
</body>
</html>
