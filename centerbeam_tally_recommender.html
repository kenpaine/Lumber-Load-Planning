<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Centerbeam Tally Recommender — 72 ft</title>
<style>
  :root{
    --bg:#1a1f16;--bg2:#222820;--bg3:#2b3126;--border:#3d4a38;--border2:#4d5e47;
    --text:#d8e4d2;--text2:#9aaa92;--text3:#6a7864;
    --green:#5c9e44;--green2:#7bbf60;--green3:#3d7a28;--amber:#c8892a;--amber2:#e0a840;--red:#b84a3c;--red2:#d45e50;
    --alert-ok-bg:#1a2e18;--alert-ok-bd:#2f5a22;--alert-warn-bg:#2e2010;--alert-warn-bd:#6a4400;
  }
  [data-theme="light"]{
    --bg:#eaeee4;--bg2:#f5f7f1;--bg3:#ffffff;--border:#d3dccb;--border2:#bdc9b3;
    --text:#283026;--text2:#566350;--text3:#84907c;
    --green:#4e8c3a;--green2:#2f7d1f;--green3:#3d7a28;--amber:#b1771d;--amber2:#9c5e0c;--red:#b8463a;--red2:#bf3327;
    --alert-ok-bg:#e4f3df;--alert-ok-bd:#bbe0ad;--alert-warn-bg:#fbf0d8;--alert-warn-bd:#e7d199;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:14px}
  header{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:center;gap:16px;height:52px}
  header h1{font-size:15px;font-weight:600;color:var(--green2);display:flex;align-items:center;gap:8px}
  .sub{font-size:11px;color:var(--text3);margin-left:auto}
  .theme-toggle{margin-left:14px;white-space:nowrap}
  .app{display:grid;grid-template-columns:300px 1fr;height:calc(100vh - 52px)}
  .sidebar{background:var(--bg2);border-right:1px solid var(--border);overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:12px}
  .sec{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--text3);padding-bottom:5px;border-bottom:1px solid var(--border);margin-top:2px}
  label{font-size:12px;color:var(--text2)}
  select{width:100%;padding:6px 8px;background:var(--bg3);border:1px solid var(--border);border-radius:5px;color:var(--text);font-size:13px;outline:none}
  select:focus{border-color:var(--green)}
  .btn{padding:7px 12px;border-radius:5px;border:1px solid var(--border2);background:var(--bg3);color:var(--text);font-size:12px;cursor:pointer;font-weight:500;text-align:center}
  .btn:hover{background:var(--border);border-color:var(--green);color:var(--green2)}
  .btn.primary{background:var(--green3);border-color:var(--green);color:#d8f0d0}
  .btn.primary:hover{background:var(--green);color:#fff}
  .btn.danger{border-color:var(--red)}.btn.danger:hover{background:var(--red);color:#fff}
  .brow{display:flex;gap:6px}.brow .btn{flex:1}
  .palette{display:flex;flex-direction:column;gap:4px}
  .prow{display:flex;align-items:center;gap:8px;padding:4px 7px;background:var(--bg3);border:1px solid var(--border);border-radius:5px;cursor:pointer;user-select:none}
  .prow:hover{border-color:var(--green)}
  .prow input{width:15px;height:15px;accent-color:var(--green);cursor:pointer}
  .lchip{display:inline-flex;align-items:center;justify-content:center;min-width:40px;padding:2px 8px;border-radius:3px;color:#33414f;font-weight:700;font-size:12px}
  .prow .pname{font-size:12px;color:var(--text2)}
  .alert{padding:8px 10px;border-radius:5px;font-size:11px;line-height:1.45}
  .alert.ok{background:var(--alert-ok-bg);border:1px solid var(--alert-ok-bd);color:var(--green2)}
  .alert.warn{background:var(--alert-warn-bg);border:1px solid var(--alert-warn-bd);color:var(--amber2)}
  .hint{font-size:11px;color:var(--text3);line-height:1.5}
  .legend{display:flex;flex-wrap:wrap;gap:5px}
  .lswatch{font-size:10px;font-weight:700;color:#33414f;padding:2px 7px;border-radius:3px}
  .main{display:flex;flex-direction:column;overflow:hidden;position:relative}
  .cr{position:absolute;right:9px;bottom:7px;font-size:9px;letter-spacing:.02em;color:var(--text3);opacity:.3;pointer-events:none;user-select:none;z-index:2}
  @media print{ .cr{display:none} }
  .tabbar{display:flex;gap:1px;padding:0 14px;background:var(--bg2);border-bottom:1px solid var(--border)}
  .tab{padding:8px 14px;font-size:12px;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;font-weight:500}
  .tab.active{color:var(--green2);border-bottom-color:var(--green)}
  .tab:hover:not(.active){color:var(--text2)}
  .tc{display:none;flex:1;overflow:auto;padding:16px}.tc.active{display:block}
  .secttitle{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--green2);margin:4px 0 10px}
  .secttitle .note{font-weight:400;text-transform:none;letter-spacing:0;color:var(--text3)}
  table.t{border-collapse:collapse;font-size:12px;margin-bottom:14px;width:max-content}
  table.t th{background:var(--bg3);color:var(--text3);font-weight:600;text-transform:uppercase;font-size:9px;letter-spacing:.04em;padding:6px 8px;border:1px solid var(--border);text-align:center}
  table.t td{padding:5px 8px;border:1px solid var(--border);text-align:center;white-space:nowrap}
  th.sortable{cursor:pointer}
  th.sortable:hover{outline:2px solid var(--green);outline-offset:-2px}
  th.sorted::after{content:" ▼";font-size:8px}
  .rowlbl{text-align:left!important;font-weight:600}
  .muted{color:var(--text3)}
  .okmark{color:var(--green2);font-weight:700}
  .rinput{width:56px;padding:3px 5px;background:var(--bg3);border:1px solid var(--border2);border-radius:4px;color:var(--text);font-size:12px;text-align:center;outline:none}
  .rinput:focus{border-color:var(--green)}
  .totrow td{background:var(--bg3);font-weight:700;border-top:2px solid var(--green)}
  /* click-to-highlight: the active table/grid row stays light blue until another is clicked */
  table.t tbody tr:not(.totrow){cursor:pointer}
  table.t tbody tr.activerow td{background:#bdd7ee!important;color:#15314e!important}
  .htext{font-size:13px;line-height:1.7;color:var(--text2);max-width:760px}
  .htext h3{font-size:12px;text-transform:uppercase;letter-spacing:.05em;color:var(--green2);margin:16px 0 6px}
  .htext code{background:var(--bg3);padding:1px 5px;border-radius:3px;font-size:12px}

  /* ---- Responsive: stack to a single column on phones (≤768px) ---- */
  @media (max-width:768px){
    header{position:sticky;top:0;z-index:30;padding:0 12px;gap:8px}
    header h1{font-size:14px}
    .sub{display:none}
    .theme-toggle{margin-left:auto}
    .app{grid-template-columns:1fr;height:auto}            /* sidebar on top, results below */
    .sidebar{border-right:none;border-bottom:1px solid var(--border);overflow:visible;height:auto;padding:12px;min-width:0}
    .main{overflow:visible;min-width:0}                    /* min-width:0 = wide tables scroll inside, don't widen the page */
    .tabbar{overflow-x:auto;-webkit-overflow-scrolling:touch}
    .tab{flex:0 0 auto;white-space:nowrap;padding:10px 13px}
    .tc{flex:none;padding:12px;-webkit-overflow-scrolling:touch}
    table.t{width:auto;max-width:100%}                     /* fit the column, not max-content */
    table.t th{white-space:normal}                         /* wrap "Total pcs" headers = narrower number columns */
    .brow .btn{min-width:0}
    /* ≥16px controls stop iOS Safari from zoom‑jumping on focus (what made the size picker feel unusable) */
    select{font-size:16px;padding:9px 10px}
    .rinput{font-size:16px;width:60px;padding:6px}
    .btn{padding:11px 12px;font-size:13px}
    .palette{display:grid;grid-template-columns:1fr 1fr;gap:6px}   /* two roomy toggles per row */
    .prow{padding:9px 10px}
    .prow input{width:20px;height:20px}
    .prow .pname{font-size:13px}
    .lchip{font-size:13px;min-width:44px}
    label{font-size:13px}
    .alert,.hint{font-size:12px}
    td.rowlbl{white-space:normal;min-width:140px;max-width:220px}  /* wrap long tally labels */
  }
</style>
</head>
<body>
<header>
  <h1>🚃 Centerbeam Tally Recommender</h1>
  <span class="sub">72 ft · choose lengths → loadable full-car tallies</span>
  <button class="btn theme-toggle" id="themeBtn" onclick="toggleTheme()" title="Toggle light / dark mode">🌙 Dark</button>
</header>

<div class="app">
  <div class="sidebar">
    <div class="sec">Settings</div>
    <div>
      <label>Car layout</label>
      <select id="carLayout" onchange="setLayout(this.value)">
        <option value="5+5">720 ft — 5 + 5 (10 rows)</option>
        <option value="7+5">864 ft — 7 + 5 (12 rows, mixed)</option>
        <option value="7+7">1008 ft — 7 + 7 (14 rows)</option>
      </select>
    </div>
    <div>
      <label>Match mode</label>
      <select id="mode" onchange="onModeChange()">
        <option value="1">Palette — use only selected</option>
        <option value="2" selected>Each selected must appear</option>
        <option value="3">Each must appear + fillers</option>
      </select>
    </div>

    <div id="paletteWrap"></div>

    <div class="brow">
      <button class="btn primary" onclick="recommend()">Recommend Tallies</button>
      <button class="btn danger" onclick="clearOut()">Clear</button>
    </div>
    <div class="alert ok" id="status">Pick lengths and click Recommend Tallies.</div>
    <div class="hint" id="modeHint"></div>

    <div class="sec">Length Colors</div>
    <div>
      <label>Color palette</label>
      <select id="paletteSel" onchange="setPalette(this.value)"></select>
    </div>
    <div class="legend" id="legend"></div>
  </div>

  <div class="main">
    <div class="tabbar">
      <div class="tab active" data-tab="recs" onclick="switchTab('recs')">Recommended Tallies</div>
      <div class="tab" data-tab="patterns" onclick="switchTab('patterns')">Row Patterns</div>
      <div class="tab" data-tab="help" onclick="switchTab('help')">How to Use</div>
    </div>
    <div class="tc active" id="tab-recs"><div id="recsBox"></div></div>
    <div class="tc" id="tab-patterns"><div id="patBox"></div></div>
    <div class="tc" id="tab-help"><div class="htext" id="helpBox"></div></div>
    <div class="cr" title="© 2026 Ken Paine — all 72 feet reserved">© 2026 Ken Paine</div>
  </div>
</div>

<script>
// ===== Centerbeam 72-ft Car — Tally Recommender (browser port of the .xlsm) =====
const LENGTHS=[8,10,12,14,16,18,20];
const LCOLORS={8:"#BBD4EA",10:"#C2E5C9",12:"#FBE7B2",14:"#E5CDEE",16:"#FAC4BC",18:"#BFEAE0",20:"#DCE7AE"};
const INK="#33414f";

// ---------- Length color schemes (shared with the Layout Planner) ----------
// 0 = Color (pastel, the default). The rest are selectable; the last two are the
// colourblind-friendly High contrast and the grayscale B & W (print) modes.
const SCHEMES=[
  {name:"Color (pastel)",         m:LCOLORS},
  {name:"Vivid",                  m:{8:"#E53935",10:"#FB8C00",12:"#FDD835",14:"#43A047",16:"#00ACC1",18:"#1E88E5",20:"#8E24AA"}},
  {name:"Material",               m:{8:"#EF5350",10:"#FFA726",12:"#FFEE58",14:"#66BB6A",16:"#26C6DA",18:"#42A5F5",20:"#AB47BC"}},
  {name:"Tableau",                m:{8:"#4E79A7",10:"#F28E2B",12:"#E15759",14:"#76B7B2",16:"#59A14F",18:"#EDC948",20:"#B07AA1"}},
  {name:"Earth / lumberyard",     m:{8:"#8C6239",10:"#C9A66B",12:"#7D8C4F",14:"#B7410E",16:"#2E5E4E",18:"#D4A017",20:"#5C3A21"}},
  {name:"Jewel tones",            m:{8:"#B71C1C",10:"#E65100",12:"#F9A825",14:"#1B5E20",16:"#00695C",18:"#1A237E",20:"#4A148C"}},
  {name:"Rainbow (warm to cool)", m:{8:"#D32F2F",10:"#F57C00",12:"#FBC02D",14:"#689F38",16:"#0097A7",18:"#1976D2",20:"#7B1FA2"}},
  {name:"Viridis (colour-safe)",  m:{8:"#440154",10:"#443983",12:"#31688E",14:"#21918C",16:"#35B779",18:"#90D743",20:"#FDE725"}},
  {name:"Sunset (warm)",          m:{8:"#5C1A33",10:"#9D2B4A",12:"#C44536",14:"#E8590C",16:"#F0A202",18:"#F4C430",20:"#F7E07A"}},
  {name:"Neon",                   m:{8:"#FF1744",10:"#FF9100",12:"#FFEA00",14:"#00E676",16:"#00E5FF",18:"#2979FF",20:"#D500F9"}},
  {name:"High contrast",          m:{8:"#1F77B4",10:"#2CA02C",12:"#FF7F0E",14:"#9467BD",16:"#D62728",18:"#17BECF",20:"#8C564B"}},
  {name:"B & W (print)",          m:{8:"#FFFFFF",10:"#EEEEEE",12:"#DDDDDD",14:"#CCCCCC",16:"#BBBBBB",18:"#AAAAAA",20:"#999999"}}
];
function bestText(hex){ const r=parseInt(hex.substr(1,2),16),g=parseInt(hex.substr(3,2),16),b=parseInt(hex.substr(5,2),16);
  return (0.299*r+0.587*g+0.114*b)>150?"#000000":"#FFFFFF"; }
function lenFill(L){ return SCHEMES[state.palette].m[L]; }
function lenText(L){ return state.palette===0?INK:bestText(lenFill(L)); }
function populatePalettes(){ const s=document.getElementById("paletteSel");
  s.innerHTML=SCHEMES.map((p,i)=>`<option value="${i}">${p.name}</option>`).join(""); s.value=String(state.palette); }
function setPalette(v){ state.palette=+v; renderPalette(); renderLegend(); render(); }

const TARGET=72, MAX_RECS=15;
const MODE_TEXT={
  1:"Palette: tallies are built only from the lengths you check.",
  2:"Each selected must appear: every checked length shows up somewhere in the car.",
  3:"Each must appear + fillers: every checked length appears; other lengths may finish a row."
};

let state={
  theme:"dark", tab:"recs", palette:0,
  carLayout:"5+5",                 // 5+5 (10 rows) | 7+5 (12, mixed) | 7+7 (14)
  selected:new Set([16,20]),       // symmetric-car length selection
  selA:new Set([12]),              // 7-row side lengths (mixed)
  selB:new Set([16,20]),           // 5-row side lengths (mixed)
  patterns:[],     // array of count objects {8:n,...}  (symmetric)
  recs:[],         // {label, counts, pcs, ft, ok}      (symmetric)
  A:null, B:null,  // {patterns, recs} per side          (mixed)
  recSort:null,    // length to sort recs by (desc), or null = default order
  patSort:null,    // length to sort patterns by
  handBuild:{},    // patternIndex -> rows to use (symmetric)
  handBuildA:{},   // mixed 7-row side: patternIndex -> rows to use
  handBuildB:{}    // mixed 5-row side: patternIndex -> rows to use
};
// --- car layout -> per-side rows ---
function layoutRows(l){ return l==="7+5"?{a:7,b:5,mixed:true}:l==="7+7"?{a:7,b:7,mixed:false}:{a:5,b:5,mixed:false}; }
function isMixed(){ return layoutRows(state.carLayout).mixed; }
function totalRows(){ const r=layoutRows(state.carLayout); return r.a+r.b; }

// ---- enumerate every multiset of allowed lengths that sums to 72 ----
function enumPatterns(allowed){
  const types=allowed.slice().sort((a,b)=>b-a);
  const out=[];
  (function rec(i,rem,cur){
    if(rem===0){ out.push(cur.slice()); return; }
    if(i>=types.length) return;
    const t=types[i];
    for(let n=Math.floor(rem/t); n>=0; n--){
      const nc=cur.slice(); for(let k=0;k<n;k++) nc.push(t);
      rec(i+1, rem-t*n, nc);
    }
  })(0,TARGET,[]);
  return out.map(arr=>{ const c={}; LENGTHS.forEach(L=>c[L]=0); arr.forEach(x=>c[x]++); return c; });
}
function rowLabel(c){ const p=[]; LENGTHS.forEach(L=>{ if(c[L]>0) p.push(c[L]+"x"+L); }); return p.join(", "); }
function pcsOf(c){ let s=0; LENGTHS.forEach(L=>s+=c[L]); return s; }
function ftOf(c){ let s=0; LENGTHS.forEach(L=>s+=c[L]*L); return s; }
function carCovers(a,b,sel,mode){
  if(mode===1) return true;
  for(const L of sel){ if((a[L]||0)===0 && (b[L]||0)===0) return false; }
  return true;
}

// ---- core recommender for a car/side of `rows` rows from a length selection ----
function recommendForRows(selSet, rows, mode){
  const sel=[...selSet].sort((a,b)=>a-b);
  if(sel.length===0) return {patterns:[], recs:[]};
  const allowed=(mode===3)?LENGTHS.slice():sel.slice();
  const patterns=enumPatterns(allowed);
  if(patterns.length===0) return {patterns:[], recs:[]};
  const selSet2=new Set(sel), recs=[];
  // single-pattern fills (all rows the same)
  for(const p of patterns){
    if(recs.length>=MAX_RECS) break;
    if(carCovers(p,p,selSet2,mode)){
      const counts={}; LENGTHS.forEach(L=>counts[L]=p[L]*rows);
      recs.push(makeRec("All "+rows+" rows:  "+rowLabel(p), counts, rows));
    }
  }
  // two-pattern blends (modes 2 and 3)
  if(mode>=2){
    outer:
    for(let i=0;i<patterns.length;i++){
      for(let j=i+1;j<patterns.length;j++){
        if(recs.length>=MAX_RECS) break outer;
        const a=patterns[i], b=patterns[j];
        if(carCovers(a,b,selSet2,mode)){
          let na=Math.floor(rows/2); if(na<1)na=1; const nb=rows-na;
          const counts={}; LENGTHS.forEach(L=>counts[L]=a[L]*na+b[L]*nb);
          recs.push(makeRec(na+" rows ("+rowLabel(a)+")  +  "+nb+" rows ("+rowLabel(b)+")", counts, rows));
        }
      }
    }
  }
  return {patterns, recs};
}

// ---- main recommend: one car (symmetric) or two independent sides (mixed 7+5) ----
function recommend(){
  const mode=+document.getElementById("mode").value;
  state.handBuild={}; state.handBuildA={}; state.handBuildB={};
  if(isMixed()){
    const R=layoutRows(state.carLayout);
    state.A=recommendForRows(state.selA, R.a, mode);
    state.B=recommendForRows(state.selB, R.b, mode);
    const okA=state.A.recs.length>0, okB=state.B.recs.length>0;
    if(okA&&okB) setStatus("ok","Mixed 7+5 car: "+state.A.recs.length+" tally(ies) for the 7‑row side (504 ft) + "+state.B.recs.length+" for the 5‑row side (360 ft).");
    else setStatus("warn","Check lengths for each side. 7‑row side: "+(okA?state.A.recs.length+" found":"none yet")+" · 5‑row side: "+(okB?state.B.recs.length+" found":"none yet")+".");
  } else {
    const r=recommendForRows(state.selected, totalRows(), mode);
    state.patterns=r.patterns; state.recs=r.recs;
    const carFt=totalRows()*72;
    if(state.selected.size===0) setStatus("warn","Check at least one length box, then click Recommend Tallies.");
    else if(r.patterns.length===0) setStatus("warn","No 72-ft row can be built from those lengths. Add another length and try again.");
    else if(r.recs.length===0) setStatus("warn","No single- or two-pattern car covers every selected length. Try ‘Palette’ mode, or hand-build on the Row Patterns tab. ("+r.patterns.length+" row patterns found.)");
    else setStatus("ok", r.recs.length+" tally(ies) recommended for a "+carFt+"-ft car ("+totalRows()+" rows). "+r.patterns.length+" valid 72-ft row patterns are on the Row Patterns tab.");
  }
  render();
}
function makeRec(label,counts,carRows){ const ft=ftOf(counts); return {label,counts,pcs:pcsOf(counts),ft,ok:ft===carRows*72}; }

function setStatus(kind,msg){ const s=document.getElementById("status"); s.className="alert "+(kind==="ok"?"ok":"warn"); s.textContent=msg; }
function clearOut(){
  state.patterns=[]; state.recs=[]; state.A=null; state.B=null; state.recSort=null; state.patSort=null; state.handBuild={}; state.handBuildA={}; state.handBuildB={};
  setStatus("ok","Cleared. Choose options and click Recommend Tallies.");
  render();
}

// ---- rendering ----
function lenHeaders(kind){
  return LENGTHS.map(L=>{
    const isSorted=(kind==="rec"&&state.recSort===L)||(kind==="pat"&&state.patSort===L);
    return `<th class="sortable${isSorted?" sorted":""}" style="background:${lenFill(L)};color:${lenText(L)}" onclick="sortBy('${kind}',${L})">${L}'</th>`;
  }).join("");
}
function lenCell(v,L){ return `<td style="${v?`background:${lenFill(L)};color:${lenText(L)};font-weight:700`:""}">${v||""}</td>`; }

function recsTableHTML(recs, title, note, how){
  if(!recs || recs.length===0) return `<div class="secttitle">${title}</div><div class="muted">No recommendations yet — pick lengths and click <b>Recommend Tallies</b>.</div>`;
  let rows=recs.slice();
  if(state.recSort!=null) rows.sort((a,b)=>(b.counts[state.recSort]||0)-(a.counts[state.recSort]||0));
  let h=`<div class="secttitle">${title}${note?` <span class="note">(${note})</span>`:""}</div>`;
  h+=`<table class="t"><thead><tr><th>#</th><th>${how}</th>${lenHeaders("rec")}<th>Total pcs</th><th>Total ft</th><th>OK?</th></tr></thead><tbody>`;
  rows.forEach((r,i)=>{
    h+=`<tr><td>${i+1}</td><td class="rowlbl">${r.label}</td>`;
    LENGTHS.forEach(L=>h+=lenCell(r.counts[L],L));
    h+=`<td>${r.pcs}</td><td>${r.ft}</td><td class="okmark">${r.ok?"OK":"check"}</td></tr>`;
  });
  return h+`</tbody></table>`;
}
function renderRecs(){
  const box=document.getElementById("recsBox");
  if(isMixed()){
    const A=state.A||{recs:[]}, B=state.B||{recs:[]};
    box.innerHTML = recsTableHTML(A.recs, "🟩 7‑row side — Recommended Tallies (504 ft)", "click a length header to sort", "Tally (how to load this side)")
      + `<div style="height:16px"></div>`
      + recsTableHTML(B.recs, "🟦 5‑row side — Recommended Tallies (360 ft)", "", "Tally (how to load this side)");
  } else {
    box.innerHTML = recsTableHTML(state.recs, "Recommended Full-Car Tallies", "click a length header to sort", "Tally (how to load the car)");
  }
}

// hand-build context per table: "S"=symmetric car, "A"=7-row side, "B"=5-row side
function hbCtx(key){
  if(key==="A") return {pats:(state.A&&state.A.patterns)||[], map:state.handBuildA, target:layoutRows(state.carLayout).a};
  if(key==="B") return {pats:(state.B&&state.B.patterns)||[], map:state.handBuildB, target:layoutRows(state.carLayout).b};
  return {pats:state.patterns, map:state.handBuild, target:totalRows()};
}
function patternsTableHTML(patterns, title, key, targetRows){
  if(!patterns || patterns.length===0) return `<div class="secttitle">${title}</div><div class="muted">No patterns yet — pick lengths and click <b>Recommend Tallies</b>.</div>`;
  let rows=patterns.map((c,i)=>({c,i}));
  if(state.patSort!=null) rows.sort((a,b)=>(b.c[state.patSort]||0)-(a.c[state.patSort]||0));
  const map=hbCtx(key).map;
  const aim=targetRows?`type Rows to use to hand-build this side — aim for ${targetRows} rows`:"type Rows to use to hand-build a car";
  let h=`<div class="secttitle">${title} <span class="note">(building blocks — click a length header to sort; ${aim})</span></div>`;
  h+=`<table class="t"><thead><tr><th>#</th><th>Row = 72 ft</th>${lenHeaders("pat")}<th>Rows to use</th></tr></thead><tbody>`;
  rows.forEach((o,i)=>{
    h+=`<tr><td>${i+1}</td><td class="rowlbl">${rowLabel(o.c)}</td>`;
    LENGTHS.forEach(L=>h+=lenCell(o.c[L],L));
    h+=`<td><input class="rinput" type="number" min="0" value="${map[o.i]||""}" oninput="setRows('${key}',${o.i},this.value)"></td>`;
    h+=`</tr>`;
  });
  h+=`<tr class="totrow"><td></td><td class="rowlbl">YOUR HAND-BUILT TALLY</td>`;
  LENGTHS.forEach(L=>h+=`<td id="tot-${key}-${L}"></td>`);
  h+=`<td id="tot-${key}-rows">0 rows</td></tr>`;
  return h+`</tbody></table>`;
}
function renderPatterns(){
  const box=document.getElementById("patBox");
  if(isMixed()){
    const R=layoutRows(state.carLayout);
    const A=state.A||{patterns:[]}, B=state.B||{patterns:[]};
    box.innerHTML = patternsTableHTML(A.patterns, "🟩 7‑row side — Valid 72-ft Row Patterns", "A", R.a)
      + `<div style="height:16px"></div>`
      + patternsTableHTML(B.patterns, "🟦 5‑row side — Valid 72-ft Row Patterns", "B", R.b);
    updateHandTotal("A"); updateHandTotal("B");
  } else {
    box.innerHTML = patternsTableHTML(state.patterns, "Valid 72-ft Row Patterns", "S", totalRows());
    updateHandTotal("S");
  }
}
function setRows(key,idx,val){
  const map=hbCtx(key).map;
  const n=parseInt(val,10);
  if(!val||isNaN(n)||n<=0) delete map[idx]; else map[idx]=n;
  updateHandTotal(key);
}
function updateHandTotal(key){
  const {pats,map,target}=hbCtx(key);
  const tot={}; LENGTHS.forEach(L=>tot[L]=0); let rows=0;
  pats.forEach((c,i)=>{ const n=+map[i]||0; if(n>0){ rows+=n; LENGTHS.forEach(L=>tot[L]+=c[L]*n); } });
  LENGTHS.forEach(L=>{ const el=document.getElementById("tot-"+key+"-"+L); if(el) el.textContent=tot[L]||""; });
  const r=document.getElementById("tot-"+key+"-rows");
  if(r){ r.textContent=rows+" / "+target+" rows"+(rows===target?"  ✓":""); r.style.color=(rows===target)?"#2f7d4f":""; }
}

function sortBy(kind,L){
  if(kind==="rec") state.recSort=(state.recSort===L)?null:L;
  else state.patSort=(state.patSort===L)?null:L;
  render();
}
function render(){ renderRecs(); renderPatterns(); }

function paletteHTML(selSet, side, title){
  const rows=LENGTHS.map(L=>{
    const on=selSet.has(L)?"checked":"";
    return `<label class="prow"><input type="checkbox" ${on} onchange="toggleLen(${L},this.checked,'${side}')"><span class="lchip" style="background:${lenFill(L)};color:${lenText(L)}">${L}'</span><span class="pname">${L} ft</span></label>`;
  }).join("");
  return `<div class="sec">${title}</div><div class="palette">${rows}</div>`;
}
function renderPalette(){
  const wrap=document.getElementById("paletteWrap");
  if(isMixed()){
    wrap.innerHTML=paletteHTML(state.selA,"A","7‑row side — lengths")+paletteHTML(state.selB,"B","5‑row side — lengths");
  } else {
    wrap.innerHTML=paletteHTML(state.selected,"S","Length Palette");
  }
}
function toggleLen(L,on,side){
  const set = side==="A"?state.selA : side==="B"?state.selB : state.selected;
  if(on) set.add(L); else set.delete(L);
  recommend();
}
function setLayout(v){ state.carLayout=v; state.recSort=null; state.patSort=null; renderPalette(); recommend(); }
function onModeChange(){ document.getElementById("modeHint").textContent=MODE_TEXT[+document.getElementById("mode").value]; recommend(); }
function renderLegend(){ document.getElementById("legend").innerHTML=LENGTHS.map(L=>`<span class="lswatch" style="background:${lenFill(L)};color:${lenText(L)}">${L}'</span>`).join(""); }

function renderHelp(){
  document.getElementById("helpBox").innerHTML=`
    <div class="secttitle">Centerbeam 72-ft Car — Tally Recommender</div>
    <p>A 72-ft centerbeam car loads in rows; every row must fill end-to-end to <b>exactly 72 ft</b>. This finds the length combinations that fill a 72-ft row, then recommends complete car tallies (720 ft = 10 rows, 864 ft = a mixed 7+5 car, or 1008 ft = 14 rows) from the lengths you choose.</p>
    <h3>Asymmetric (mixed 7+5) cars</h3>
    <p>Pick <b>Car layout → 7 + 5</b> when the two sides load to different heights — e.g. a <b>7-row side</b> of short stock (504 ft) and a <b>5-row side</b> of taller stock (360 ft). You then get a <b>separate length palette and a separate recommended tally for each side</b>, since each side may use different lengths. The 5+5 and 7+7 layouts are the normal symmetric full cars.</p>
    <h3>How to use</h3>
    <p>1.&nbsp; Pick a <b>Car layout</b> (5+5, 7+5 mixed, or 7+7).<br>
    2.&nbsp; Pick a <b>Match mode</b> — <code>Palette</code> builds only from checked lengths; <code>Each selected must appear</code> makes every checked length show up in the car; <code>Each must appear + fillers</code> lets other lengths finish a row.<br>
    3.&nbsp; Check the lengths you want in the <b>Length Palette</b>.<br>
    4.&nbsp; Read the <b>Recommended Tallies</b> (it updates as you change options).</p>
    <h3>Recommended Tallies</h3>
    <p>Each row is a ready-to-load car: the piece count per length, total pieces, total feet (always rows × 72), and an OK check. <b>Click any length column header</b> to sort by that length, most first.</p>
    <h3>Row Patterns</h3>
    <p>Every way to fill a single 72-ft row from your lengths. Click a length header to sort. To hand-build a car, type how many <b>Rows to use</b> of each pattern; the <b>YOUR HAND-BUILT TALLY</b> line totals the pieces per length and shows the running <b>rows / target</b> (a ✓ when they match). On a <b>mixed 7+5</b> car each side gets its own pattern table with its own <b>Rows to use</b> column, so you build the 7‑row side to 7 rows and the 5‑row side to 5 rows independently.</p>
    <h3>Color palette</h3>
    <p>Switch the <b>Length Colors</b> between <code>Color</code> (the pastel scheme), <code>High contrast</code> (saturated, maximally distinct), and <code>B &amp; W (print)</code> (grayscale) — the palette checkboxes, the legend, and every table recolor to match. Use <b>B &amp; W</b> for clean black-and-white printouts. (Matches the Layout Planner's Manifest palette.)</p>
    <h3>Notes</h3>
    <p>Only length controls the 72-ft fit; product and grade aren't part of this tool. Up to 15 recommendations and 101 row patterns are listed. This page runs entirely in your browser — nothing is uploaded, and there are no macros or security prompts.</p>
  `;
}

// ---- tabs / theme ----
function switchTab(t){
  document.querySelectorAll(".tab").forEach(x=>x.classList.toggle("active",x.dataset.tab===t));
  document.querySelectorAll(".tc").forEach(x=>x.classList.remove("active"));
  document.getElementById("tab-"+t).classList.add("active");
  state.tab=t;
}
function applyTheme(t){
  state.theme=(t==="light")?"light":"dark";
  document.documentElement.setAttribute("data-theme",state.theme);
  const b=document.getElementById("themeBtn"); if(b) b.textContent=(state.theme==="light")?"☀ Light":"🌙 Dark";
}
function initTheme(){ let s="dark"; try{ s=localStorage.getItem("ctr-theme")||"dark"; }catch(e){} applyTheme(s); }
function toggleTheme(){ applyTheme(state.theme==="light"?"dark":"light"); try{ localStorage.setItem("ctr-theme",state.theme); }catch(e){} }

// Click any tallies/pattern row to highlight it; it stays lit until another row is clicked.
function rowHighlight(ev){
  const tr=ev.target.closest("table.t tbody tr");
  if(!tr || tr.classList.contains("totrow")) return;   // ignore headers and the hand-build total
  document.querySelectorAll("table.t tbody tr.activerow").forEach(r=>r.classList.remove("activerow"));
  tr.classList.add("activerow");
}

window.addEventListener("load",()=>{
  initTheme(); populatePalettes(); renderPalette(); renderLegend(); renderHelp();
  document.getElementById("modeHint").textContent=MODE_TEXT[+document.getElementById("mode").value];
  document.addEventListener("click",rowHighlight);   // click-to-highlight rows
  recommend();  // seed an example on open
});
</script>
</body>
</html>
